name: Deploy Observability Stack

on:
  push:
    branches: [main]
  workflow_dispatch:       # Allow manual trigger from Actions tab

# Prevent concurrent deploys
concurrency:
  group: deploy-observability
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Observability-VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add VM to known_hosts (avoids interactive prompt)
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Bootstrap Docker (first run only)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            'bash -s' < scripts/bootstrap.sh

      - name: Sync files to VM
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/observability-staging/

      - name: Deploy stack
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "APPS_VM_IP='${{ secrets.APPS_VM_PRIVATE_IP }}' \
             GF_ADMIN_PASSWORD='${{ secrets.GF_ADMIN_PASSWORD }}' \
             bash ~/observability-staging/scripts/deploy.sh"

      - name: Verify deployment
        run: |
          echo "Waiting 10s for services to fully start..."
          sleep 10

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            'echo "=== Container Status ===" && \
             sudo docker compose -f /opt/observability/docker-compose.yml ps && \
             echo "" && \
             echo "=== Disk Usage ===" && \
             df -h / | tail -1'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
